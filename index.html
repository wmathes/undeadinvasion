<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Undead Invasion - top-down zombie shooter." />
    <title>Undead Invasion</title>

    <!--
        Single module entry point. Bun's bundler walks imports from here
        (TypeScript, CSS, PixiJS) and emits a hashed bundle.
    -->
    <script type="module" src="./src/main.ts"></script>
</head>
<body>
    <div id="gameDiv">
        <!--
            Menu overlay. Its visibility is toggled by src/ui/Hud.ts based
            on Game.State ("menu" vs "game"). All game state binding is
            done in code now; no template engine markup in the HTML.
        -->
        <div id="menu" class="menu" style="position: relative; height: 0;">
            <div class="gamelogo"></div>
            <div class="gamemodeselection" style="position: absolute; top: 610px; left: 0; text-align: center; width: 920px;">
                <button id="btn-easy">Easy</button>
                <button id="btn-normal">Normal</button>
                <button id="btn-hard">Hard</button>
                <br /><br /><button id="btn-ultra" class="specialHidden">Ultra</button>
            </div>

            <!-- End-of-round score display. Hidden until Game.GameScore is non-null. -->
            <div id="game-score" class="gamescore" hidden>
                <div class="label">Time Played</div>
                <div id="game-score-time" class="time"></div>
                <div class="label">Score</div>
                <div id="game-score-points" class="score"></div>
            </div>
        </div>

        <!--
            In-game HUD. Kept in HTML for now (real <button>s, accessible,
            CSS-styleable); future iteration may move it into PixiJS so it
            can share visual effects with the game world.
        -->
        <div id="hud" class="interface" hidden style="position: relative; height: 0;">
            <div class="score" style="position: absolute; top: 8px; right: 14px;">
                <span id="hud-score" style="font-size: 18px;">0</span>
            </div>
            <div id="hud-weapon" class="weapon">
                <div id="hud-weapon-icon" class="icon"></div>
                <div id="hud-reload" class="reload" hidden>
                    <div id="hud-reload-progress" class="progress"></div>
                </div>
                <div id="hud-magazine" class="magazin"></div>
            </div>
            <div class="player">
                <div class="healthbar">
                    <div id="hud-healthbar"></div>
                </div>
                <div class="icon"></div>
            </div>
        </div>

        <canvas></canvas>

        <div class="fullscreenMessage" id="messageGameOver">
            <div class="title">Game Over</div>
        </div>

        <div id="debug"></div>
    </div>
</body>
</html>
