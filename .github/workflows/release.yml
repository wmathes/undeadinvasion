name: Release

# Runs on every push to a tracked branch. semantic-release figures out
# whether the commits since the last git tag warrant a release, and, if so,
# publishes to npm and creates a GitHub Release with the bundle zip.
on:
  push:
    branches:
      - main
      - next

permissions:
  contents: write # create tags + releases, push commits back if git plugin is added later
  issues: write # semantic-release comments on referenced issues
  pull-requests: write # same, for PRs
  id-token: write # npm provenance (SLSA attestation)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs full history to walk commits back to the last tag
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node (for semantic-release and npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build production bundle
        run: bun run build

      - name: Package dist/ as zip
        # Deterministic name - semantic-release renames on upload via the
        # `name` field in .release.mjs so the uploaded asset has the version in it.
        run: |
          mkdir -p release-assets
          cd dist && zip -qr ../release-assets/undeadinvasion-bundle.zip . && cd ..
          ls -la release-assets/

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bunx semantic-release
